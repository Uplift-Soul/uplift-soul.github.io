<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Twitch Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  :root{
    --bg:#08080d;
    --panel:#11111b;
    --panel-2:#171723;
    --line:#23232f;
    --text:#ececf4;
    --muted:#8a8aa0;
    --accent:#a970ff;
    --accent-dim:#6f4bb0;
    --teal:#13e3c5;
    --glow:rgba(169,112,255,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:"IBM Plex Sans",sans-serif;
    min-height:100vh;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(900px 500px at 80% -10%, var(--glow), transparent 60%),
      radial-gradient(700px 400px at 0% 0%, rgba(19,227,197,.06), transparent 55%);
    background-attachment:fixed;
  }
  /* faint dot grid texture */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:radial-gradient(rgba(255,255,255,.035) 1px, transparent 1px);
    background-size:26px 26px;
  }
  .wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:32px 22px 60px}

  /* header */
  header{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;
    border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:26px;
    opacity:0;animation:rise .7s .05s forwards}
  .brand{display:flex;flex-direction:column;gap:6px}
  .kicker{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.32em;
    text-transform:uppercase;color:var(--accent)}
  h1{font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:clamp(28px,5vw,46px);
    letter-spacing:.01em;line-height:1.02}
  h1 span{color:var(--accent)}
  .status{display:flex;align-items:center;gap:10px;font-family:"IBM Plex Mono",monospace;
    font-size:12px;color:var(--muted)}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--teal);
    box-shadow:0 0 0 0 rgba(19,227,197,.6);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(19,227,197,.55)}70%{box-shadow:0 0 0 10px rgba(19,227,197,0)}100%{box-shadow:0 0 0 0 rgba(19,227,197,0)}}

  /* kpi strip */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:30px}
  .kpi{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);
    border-radius:14px;padding:18px 18px 16px;opacity:0;animation:rise .7s forwards}
  .kpi:nth-child(1){animation-delay:.12s}.kpi:nth-child(2){animation-delay:.18s}
  .kpi:nth-child(3){animation-delay:.24s}.kpi:nth-child(4){animation-delay:.30s}
  .kpi .label{font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--muted)}
  .kpi .val{font-family:"Chakra Petch",sans-serif;font-weight:700;font-size:30px;margin-top:8px;line-height:1}
  .kpi .sub{font-size:12px;color:var(--muted);margin-top:6px}
  .kpi .val.sm{font-size:21px}

  /* panels */
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:22px;margin-bottom:24px;opacity:0;animation:rise .7s .36s forwards}
  .panel h2{font-family:"Chakra Petch",sans-serif;font-weight:600;font-size:16px;
    letter-spacing:.04em;text-transform:uppercase;display:flex;align-items:center;gap:10px;margin-bottom:18px}
  .panel h2::before{content:"";width:14px;height:2px;background:var(--accent);display:inline-block}

  /* category bars */
  .rows{display:flex;flex-direction:column;gap:9px}
  .row{display:grid;grid-template-columns:30px 1fr 92px;align-items:center;gap:14px}
  .rank{font-family:"IBM Plex Mono",monospace;font-size:13px;color:var(--muted);text-align:right}
  .barwrap{position:relative}
  .barname{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
  .cat{font-weight:500;font-size:14px}
  .conc{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--muted)}
  .conc b{color:var(--teal);font-weight:500}
  .track{height:8px;background:var(--panel-2);border-radius:6px;overflow:hidden}
  .fill{height:100%;border-radius:6px;width:0;
    background:linear-gradient(90deg,var(--accent-dim),var(--accent));
    transition:width 1s cubic-bezier(.2,.7,.2,1)}
  .views{font-family:"IBM Plex Mono",monospace;font-size:14px;font-weight:500;text-align:right}

  /* chart */
  .chartbox{position:relative;height:380px}
  .panel.trend{animation-delay:.44s}

  footer{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--muted);
    text-align:center;margin-top:34px;letter-spacing:.04em}

  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  .loading,.error{font-family:"IBM Plex Mono",monospace;color:var(--muted);font-size:13px;padding:14px 0}
  .error{color:#ff8080}

  @media(max-width:760px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    .row{grid-template-columns:24px 1fr 70px;gap:10px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="kicker">Live category intelligence</div>
      <h1>Twitch <span>Analytics</span></h1>
    </div>
    <div class="status"><span class="dot"></span><span id="updated">connecting…</span></div>
  </header>

  <div class="kpis" id="kpis"></div>

  <section class="panel">
    <h2>Top Categories — Now</h2>
    <div id="cats"><div class="loading">Loading current snapshot…</div></div>
  </section>

  <section class="panel trend">
    <h2>Viewership Trend</h2>
    <div class="chartbox"><canvas id="trend"></canvas></div>
  </section>

  <footer id="foot">Twitch Helix data · collected every 3 hours · powered by a Raspberry Pi</footer>
</div>

<script>
const PALETTE = ["#a970ff","#13e3c5","#ff7eb6","#ffb347","#5aa9ff","#9dff6e","#ff6b6b","#c08bff","#46d6a8","#ffd166"];

const fmt = n => {
  n = Number(n)||0;
  if (n>=1e6) return (n/1e6).toFixed(n>=1e7?0:1).replace(/\.0$/,'')+"M";
  if (n>=1e3) return (n/1e3).toFixed(n>=1e4?0:1).replace(/\.0$/,'')+"K";
  return String(n);
};
const fullNum = n => (Number(n)||0).toLocaleString("en-GB");

function timeAgo(iso){
  if(!iso) return "unknown";
  const d=new Date(iso), now=new Date(), mins=Math.round((now-d)/60000);
  if(mins<60) return mins<=1?"just now":mins+" min ago";
  const h=Math.round(mins/60); if(h<24) return h+"h ago";
  return Math.round(h/24)+"d ago";
}

function renderKpis(data){
  const cur=data.current||[];
  const totalNow=cur.reduce((s,c)=>s+(c.viewership||0),0);
  const top=cur[0];
  const days=new Set((data.trend||[]).map(t=>t.day)).size;
  const cards=[
    {label:"Top Category", val:top?top.category:"—", sub:top?fullNum(top.viewership)+" viewers":"", sm:true},
    {label:"Tracked Viewers (now)", val:fmt(totalNow), sub:"across top "+cur.length+" categories"},
    {label:"Categories Live", val:cur.length, sub:"in latest snapshot"},
    {label:"History Depth", val:days, sub:"days of data"},
  ];
  document.getElementById("kpis").innerHTML = cards.map(c=>`
    <div class="kpi">
      <div class="label">${c.label}</div>
      <div class="val ${c.sm?'sm':''}">${c.val}</div>
      <div class="sub">${c.sub||""}</div>
    </div>`).join("");
}

function renderCats(data){
  const cur=data.current||[];
  if(!cur.length){document.getElementById("cats").innerHTML='<div class="error">No current data yet.</div>';return;}
  const max=Math.max(...cur.map(c=>c.viewership||0))||1;
  document.getElementById("cats").innerHTML = '<div class="rows">'+cur.map(c=>`
    <div class="row">
      <div class="rank">${String(c.rank).padStart(2,'0')}</div>
      <div class="barwrap">
        <div class="barname">
          <span class="cat">${c.category}</span>
          <span class="conc">top 10 = <b>${c.top10_pct!=null?c.top10_pct+'%':'—'}</b></span>
        </div>
        <div class="track"><div class="fill" data-w="${(c.viewership/max*100).toFixed(1)}"></div></div>
      </div>
      <div class="views">${fmt(c.viewership)}</div>
    </div>`).join("")+'</div>';
  requestAnimationFrame(()=>document.querySelectorAll(".fill").forEach(f=>f.style.width=f.dataset.w+"%"));
}

function renderTrend(data){
  const trend=data.trend||[];
  const cats=[...new Set(trend.map(t=>t.category))];
  const datasets=cats.map((cat,i)=>({
    label:cat,
    data:trend.filter(t=>t.category===cat).map(t=>({x:t.day,y:t.viewership})),
    borderColor:PALETTE[i%PALETTE.length],
    backgroundColor:PALETTE[i%PALETTE.length],
    borderWidth:1.8,pointRadius:0,pointHoverRadius:4,tension:.25,
    spanGaps:false,
  }));
  new Chart(document.getElementById("trend"),{
    type:"line",
    data:{datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:"nearest",intersect:false},
      plugins:{
        legend:{labels:{color:"#cfcfe0",font:{family:"IBM Plex Sans",size:11},boxWidth:10,boxHeight:10,usePointStyle:true,padding:14}},
        tooltip:{backgroundColor:"#11111b",borderColor:"#2a2a3a",borderWidth:1,
          titleFont:{family:"IBM Plex Mono"},bodyFont:{family:"IBM Plex Mono"},
          callbacks:{label:c=>` ${c.dataset.label}: ${fullNum(c.parsed.y)}`}}
      },
      scales:{
        x:{type:"time",time:{unit:"month"},
           grid:{color:"rgba(255,255,255,.04)"},
           ticks:{color:"#8a8aa0",font:{family:"IBM Plex Mono",size:10},maxRotation:0}},
        y:{grid:{color:"rgba(255,255,255,.04)"},
           ticks:{color:"#8a8aa0",font:{family:"IBM Plex Mono",size:10},callback:v=>fmt(v)}}
      }
    }
  });
}

fetch("data.json?_="+Date.now())
  .then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
  .then(data=>{
    document.getElementById("updated").textContent = "updated "+timeAgo(data.latest_snapshot||data.generated_at);
    renderKpis(data);
    renderCats(data);
    renderTrend(data);
  })
  .catch(e=>{
    document.getElementById("updated").textContent="data unavailable";
    document.getElementById("cats").innerHTML='<div class="error">Couldn\'t load data.json ('+e.message+').</div>';
  });
</script>
</body>
</html>
