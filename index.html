<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      text-align: center;
      padding: 30px;
      border-radius: 12px;
      background: #1e293b;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      margin: 0 0 10px;
    }

    p {
      color: #94a3b8;
    }

    .tag {
      margin-top: 15px;
      font-size: 12px;
      color: #38bdf8;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>GitHub Pages Works</h1>
    <p>If you see this, your deploy is correct.</p>
    <div class="tag">v1.0 test build</div>
  </div>
</body>
</html>
